<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Lantso, very limited Moroccan jerseys for the 2026 World Cup. Roots 01 Khaki and Atlas 02 White."
    >

    <meta property="og:description" content="Very limited Moroccan jerseys for the 2026 World Cup. 25 pieces per colour.">
    <meta property="og:image" content="https://www.lantso.com/assets/photos/hero.png">
    <meta property="og:url" content="https://www.lantso.com/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="/lantso_logo.svg" type="image/svg+xml">
    <title>Lantso - From the Roots to the World</title>

            "image": "https://www.lantso.com/assets/photos/atlas-02-white.png",
            "sku": "ATLAS-02-WHITE",
            "brand": { "@type": "Brand", "name": "Lantso" },
            "material": "100% polyester",
            "offers": {
              "@type": "Offer",
              "url": "https://www.lantso.com/product/atlas-02-white",

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Luxurious+Script&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css?v=20260516">
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <header class="site-header" data-floating="true">
      <nav class="language-switch" aria-label="Language">
        <button class="lang-button is-active" type="button" data-lang="en" aria-label="English">🇬🇧</button>
        <button class="lang-button" type="button" data-lang="fr" aria-label="Francais">🇫🇷</button>
        <button class="lang-button" type="button" data-lang="ar" aria-label="العربية">🇲🇦</button>
      </nav>
      <a href="/" class="brand-word" data-link aria-label="Lantso home">
        <img src="/Lantso_text.svg" alt="Lantso">
      </a>
      <div class="header-actions">
        <button class="cart-button" type="button" data-open-cart aria-label="Cart">
          <span class="bag-icon" aria-hidden="true"></span>
          <span class="cart-count" data-cart-count>0</span>
        </button>
        <button class="join-button" type="button" data-open-club>Join the club</button>
      </div>
    </header>

    <main id="app" tabindex="-1">
      <noscript>
        <section>
          <h1>Lantso - From the Roots to the World</h1>
          <p>Very limited Moroccan jerseys for the 2026 World Cup.</p>
          <article>
            <h2>Roots 01 - Khaki</h2>
            <p>Limited khaki green Moroccan jersey. 59.99 EUR. 100% polyester. Sizes M and L.</p>
            <a href="/product/roots-01-khaki">Roots 01 - Khaki</a>
          </article>
          <article>
            <h2>Atlas 02 - White</h2>
            <p>Limited white Moroccan jersey. 59.99 EUR. 100% polyester. Sizes M and L.</p>
            <a href="/product/atlas-02-white">Atlas 02 - White</a>
          </article>
        </section>
      </noscript>
    </main>

    <aside class="cart-drawer" data-cart-drawer aria-hidden="true" aria-labelledby="cart-title">
      <div class="cart-panel">
        <div class="cart-panel__head">
          <h2 id="cart-title" data-i18n="cart.title">Cart</h2>
          <button class="plain-x" type="button" data-close-cart aria-label="Close">×</button>
        </div>
        <div class="cart-panel__body" data-cart-body></div>
      </div>
    </aside>

    <dialog class="club-modal" data-club-modal>
      <form class="club-card" data-club-form method="dialog">
        <div class="modal-head">
          <h2 data-i18n="club.title">Join the club</h2>
          <button class="plain-x" type="button" data-close-club aria-label="Close">×</button>
        </div>
        <label>
          <span data-i18n="club.name">Name</span>
          <input name="name" autocomplete="name" required>
        </label>
        <label>
          <span data-i18n="club.email">Email</span>
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <label class="check-row">
          <input name="newsletter" type="checkbox" checked>
          <span data-i18n="club.newsletter">Newsletter and early access</span>
        </label>
        <button class="button-primary" type="submit" data-i18n="club.submit">Create profile</button>
        <p class="form-message" data-club-message role="status"></p>
      </form>
    </dialog>

    <template id="payment-badges">
      <div class="payment-strip" aria-label="secure payments">
        <span class="payment-icon amex" aria-label="American Express"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="14">AM</text><text x="32" y="25">EX</text></svg></span>
        <span class="payment-icon apple" aria-label="Apple Pay"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">Pay</text></svg></span>
        <span class="payment-icon bancontact" aria-label="Bancontact"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><path d="M8 18h48v8H8z"/><path d="M8 8h48v8H8z"/><text x="32" y="22">bc</text></svg></span>
        <span class="payment-icon gpay" aria-label="Google Pay"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">G Pay</text></svg></span>
        <span class="payment-icon ideal" aria-label="iDEAL"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">iDEAL</text></svg></span>
        <span class="payment-icon klarna" aria-label="Klarna"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">Klarna</text></svg></span>
        <span class="payment-icon maestro" aria-label="Maestro"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><circle cx="26" cy="17" r="10"/><circle cx="38" cy="17" r="10"/><text x="32" y="28">Maestro</text></svg></span>
        <span class="payment-icon mastercard" aria-label="Mastercard"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><circle cx="26" cy="17" r="10"/><circle cx="38" cy="17" r="10"/></svg></span>
        <span class="payment-icon shoppay" aria-label="Shop Pay"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">shop</text></svg></span>
        <span class="payment-icon unionpay" aria-label="UnionPay"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="15">Union</text><text x="32" y="25">Pay</text></svg></span>
        <span class="payment-icon visa" aria-label="Visa"><svg viewBox="0 0 64 34"><rect width="64" height="34" rx="4"/><text x="32" y="22">VISA</text></svg></span>
      </div>
    </template>

    <form name="club" netlify netlify-honeypot="bot-field" hidden>
      <input name="name">
      <input name="email">
      <input name="newsletter">
      <input name="bot-field">
    </form>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="name">
      <input name="email">
      <textarea name="message"></textarea>
      <input name="bot-field">
    </form>

    <script type="module" src="/app.js?v=20260516b"></script>
  </body>
</html>
